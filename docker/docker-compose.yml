services:

  # -----------------------------------------------------------
  # ZOOKEEPER - Kafka coordinator
  # -----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rapid-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # KAFKA - Message streaming (Speed Layer)
  # -----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - rapid-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 10
      start_period: 30s

  # -----------------------------------------------------------
  # HADOOP NAMENODE - HDFS master (Batch Layer)
  # -----------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=rapid
    env_file:
      - ./hadoop.env
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - rapid-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 10s
      retries: 10
      start_period: 30s

  # -----------------------------------------------------------
  # HADOOP DATANODE - HDFS storage (Batch Layer)
  # -----------------------------------------------------------
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    ports:
      - "9864:9864"
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - rapid-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # HBASE - NoSQL for batch views (ip_reputation, attack_patterns)
  # -----------------------------------------------------------
  hbase:
    image: dajobe/hbase:latest
    container_name: hbase
    ports:
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "16030:16030"
    networks:
      - rapid-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # SPARK MASTER - Batch + Streaming engine
  # -----------------------------------------------------------
  spark-master:
    image: jupyter/pyspark-notebook:latest
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    volumes:
      - ../spark:/home/jovyan/work/spark
      - ../data:/home/jovyan/work/data
    networks:
      - rapid-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # SPARK WORKER - Executes Spark jobs
  # -----------------------------------------------------------
  spark-worker:
    image: jupyter/pyspark-notebook:latest
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    volumes:
      - ../spark:/home/jovyan/work/spark
      - ../data:/home/jovyan/work/data
    depends_on:
      - spark-master
    networks:
      - rapid-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # CASSANDRA - Real-time threat storage (Speed Layer)
  # -----------------------------------------------------------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=rapid-cluster
      - CASSANDRA_DC=dc1
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - rapid-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      retries: 10
      start_period: 60s

  # -----------------------------------------------------------
  # KAFKA SETUP - Creates cybersecurity-logs topic (3 partitions)
  # Runs once after Kafka is healthy then exits
  # -----------------------------------------------------------
  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - rapid-net
    entrypoint: >
      bash -c "
        echo '>>> Creating Kafka topic: cybersecurity-logs...' &&
        kafka-topics --bootstrap-server kafka:9092
          --create --if-not-exists
          --topic cybersecurity-logs
          --partitions 3
          --replication-factor 1 &&
        echo '>>> Topic created!' &&
        kafka-topics --bootstrap-server kafka:9092 --list &&
        echo '>>> Kafka setup complete!'
      "
    restart: "no"

  # -----------------------------------------------------------
  # CASSANDRA SETUP - Creates keyspace + tables for Sprint 2
  # Runs once after Cassandra is healthy then exits
  # -----------------------------------------------------------
  cassandra-setup:
    image: cassandra:4.1
    container_name: cassandra-setup
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - rapid-net
    entrypoint: >
      bash -c "
        echo '>>> Setting up Cassandra schema...' &&
        cqlsh cassandra -e \"
          CREATE KEYSPACE IF NOT EXISTS rapid
            WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};

          USE rapid;

          CREATE TABLE IF NOT EXISTS realtime_threats (
            ip_source     text PRIMARY KEY,
            last_seen     timestamp,
            threat_score  float,
            attack_types  list<text>
          );

          CREATE TABLE IF NOT EXISTS recent_attacks (
            id          uuid PRIMARY KEY,
            ip_source   text,
            timestamp   timestamp,
            attack_type text,
            protocol    text,
            bytes       bigint
          );
        \" &&
        echo '>>> Cassandra schema ready!'
      "
    restart: "no"

  # -----------------------------------------------------------
  # HDFS SETUP - Creates partitions + loads CSV
  # Runs once after namenode is healthy then exits
  # -----------------------------------------------------------
  hdfs-setup:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: rapid-hdfs-setup
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - ../data/raw:/data/raw
    env_file:
      - ./hadoop.env
    networks:
      - rapid-net
    entrypoint: >
      bash -c "
        echo '>>> Creating HDFS partition structure...' &&
        hdfs dfs -mkdir -p
          /logs/year=2024/month=01
          /logs/year=2024/month=02
          /logs/year=2024/month=03
          /logs/year=2024/month=04
          /logs/year=2024/month=05
          /logs/year=2024/month=06
          /logs/year=2024/month=07
          /logs/year=2024/month=08
          /logs/year=2024/month=09
          /logs/year=2024/month=10
          /logs/year=2024/month=11
          /logs/year=2024/month=12
          /data/cybersecurity/batch
          /data/cybersecurity/streaming &&
        echo '>>> Partitions created!' &&
        if [ -f /data/raw/cybersecurity_threat_detection_logs.csv ]; then
          echo '>>> Loading CSV into HDFS...' &&
          hdfs dfs -put -f /data/raw/cybersecurity_threat_detection_logs.csv /logs/year=2024/month=01/ &&
          echo '>>> CSV loaded successfully!' &&
          hdfs dfs -ls /logs/year=2024/month=01/
        else
          echo '>>> WARNING: CSV not found in data/raw/' &&
          echo '>>> Run: docker-compose up init   first!'
        fi &&
        echo '>>> HDFS setup complete!'
      "
    restart: "no"

  # -----------------------------------------------------------
  # INIT - Downloads dataset from Kaggle
  # Credentials from your local .env file (never pushed to git)
  # Copy .env.example to .env and fill in your details
  # -----------------------------------------------------------
  init:
    image: python:3.11-slim
    container_name: rapid-init
    env_file:
      - .env
    volumes:
      - ../data/raw:/data/raw
      - ./init.sh:/init.sh
    networks:
      - rapid-net
    entrypoint: sh /init.sh
    restart: "no"

volumes:
  namenode_data:
  datanode_data:
  cassandra_data:

networks:
  rapid-net:
    driver: bridge
