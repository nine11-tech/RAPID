services:

  # ─── ZOOKEEPER ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rapid-net

  # ─── KAFKA ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - rapid-net

  # ─── HADOOP NAMENODE ─────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=rapid
    env_file:
      - ./hadoop.env
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - rapid-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 10s
      retries: 10
      start_period: 30s

  # ─── HADOOP DATANODE ─────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    ports:
      - "9864:9864"
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - rapid-net

  # ─── HBASE ───────────────────────────────────────────────
  hbase:
    image: dajobe/hbase:latest
    container_name: hbase
    ports:
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "16030:16030"
    networks:
      - rapid-net

  # ─── INIT: Download dataset from Kaggle ──────────────────
  # Each teammate fills in their own Kaggle credentials below
  # Get yours at: https://www.kaggle.com/settings → API → Create New Token
  init:
    image: python:3.11-slim
    container_name: rapid-init
    environment:
      KAGGLE_USERNAME: "Hamza Lahbal"   # <-- fill this
      KAGGLE_KEY: "KGAT_b96a262981b831cd15017061d2b1ace0"             # <-- fill this
    volumes:
      - ../data/raw:/data/raw
      - ./init.sh:/init.sh
    networks:
      - rapid-net
    entrypoint: sh /init.sh
    restart: "no"

  # ─── HDFS SETUP: Create partitions + load CSV ────────────
  # Runs automatically after namenode is healthy
  hdfs-setup:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: rapid-hdfs-setup
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - ../data/raw:/data/raw
    env_file:
      - ./hadoop.env
    networks:
      - rapid-net
    entrypoint: >
      bash -c "
        echo '>>> [1/3] Creating HDFS partition structure...' &&
        hdfs dfs -mkdir -p
          /logs/year=2024/month=01
          /logs/year=2024/month=02
          /logs/year=2024/month=03
          /logs/year=2024/month=04
          /logs/year=2024/month=05
          /logs/year=2024/month=06
          /logs/year=2024/month=07
          /logs/year=2024/month=08
          /logs/year=2024/month=09
          /logs/year=2024/month=10
          /logs/year=2024/month=11
          /logs/year=2024/month=12
          /data/cybersecurity/batch
          /data/cybersecurity/streaming &&
        echo '>>> [2/3] Partitions created!' &&
        echo '>>> [3/3] Loading CSV into HDFS...' &&
        if [ -f /data/raw/cybersecurity_threat_detection_logs.csv ]; then
          hdfs dfs -put -f /data/raw/cybersecurity_threat_detection_logs.csv /logs/year=2024/month=01/ &&
          echo '>>> CSV loaded into HDFS successfully!' &&
          hdfs dfs -ls -R /logs
        else
          echo '>>> WARNING: CSV not found. Run the init service first!' &&
          echo '>>> docker-compose up init'
        fi &&
        echo '>>> HDFS setup complete!'
      "
    restart: "no"

volumes:
  namenode_data:
  datanode_data:

networks:
  rapid-net:
    driver: bridge
